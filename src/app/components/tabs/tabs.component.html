<ion-tabs>
  <ion-tab-bar slot="top">
    <ng-container *ngFor="let tab of tabs">
      <ion-tab-button [tab]="tab.tabName" (click)="onClickTab(tab.tabName)">
        <ion-icon [name]="tab.icon"></ion-icon>
        <ion-label>{{ tab.title }}</ion-label>
      </ion-tab-button>
    </ng-container>
  </ion-tab-bar>
</ion-tabs>
