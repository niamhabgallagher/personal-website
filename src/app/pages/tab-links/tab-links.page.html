<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="ion-text-center">Niamh Gallagher</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-tabs>
    <ion-tab-bar slot="top">
      <ng-container *ngFor="let tab of tabs">
        <ion-tab-button [tab]="tab.tabName">
          <ion-icon [name]="tab.icon"></ion-icon>
          <ion-label>{{ tab.title }}</ion-label>
        </ion-tab-button>
      </ng-container>
    </ion-tab-bar>
  </ion-tabs>
</ion-content>
